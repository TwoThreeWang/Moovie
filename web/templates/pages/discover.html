
{{ define "content" }}
<h1 class="page-title">📺 发现</h1>
<p class="page-subtitle">发现全网最热门的影视作品</p>

<!-- 热门分类导航 -->
<div class="tab-nav" style="margin-bottom: 24px;">
    <a href="javascript:void(0)"
       hx-get="/discover/movie"
       hx-target="#discover-content"
       hx-push-url="true"
       hx-on:click="showDiscoverLoading()"
       class="tab-btn {{ if eq .CurrentType "movie" }}active{{ end }}"
       onclick="updateActiveTab(this)">热门电影</a>
    <a href="javascript:void(0)"
       hx-get="/discover/tv"
       hx-target="#discover-content"
       hx-push-url="true"
       hx-on:click="showDiscoverLoading()"
       class="tab-btn {{ if eq .CurrentType "tv" }}active{{ end }}"
       onclick="updateActiveTab(this)">热门剧集</a>
    <a href="javascript:void(0)"
       hx-get="/discover/show"
       hx-target="#discover-content"
       hx-push-url="true"
       hx-on:click="showDiscoverLoading()"
       class="tab-btn {{ if eq .CurrentType "show" }}active{{ end }}"
       onclick="updateActiveTab(this)">热门综艺</a>
    <a href="javascript:void(0)"
       hx-get="/discover/cartoon"
       hx-target="#discover-content"
       hx-push-url="true"
       hx-on:click="showDiscoverLoading()"
       class="tab-btn {{ if eq .CurrentType "cartoon" }}active{{ end }}"
       onclick="updateActiveTab(this)">日本动画</a>
</div>

<div id="discover-content-wrapper" style="position: relative; min-height: 400px;">
    <!-- 内容区域 -->
    <div id="discover-content"
         hx-get="/discover?type={{ .CurrentType }}"
         hx-trigger="load">
        <!-- 初始加载通过 htmx 触发 -->
        <div class="loading-container"><div class="simple-spinner"></div></div>
    </div>
</div>

<style>
    .loading-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 300px;
        width: 100%;
    }

    /* 极简 Spinner 效果 */
    .simple-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(0,0,0,0.1);
        border-top-color: #f60c3e;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>

<script>
    function updateActiveTab(el) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        el.classList.add('active');
    }
    function showDiscoverLoading() {
    const content = document.getElementById('discover-content');
    if (content) {
        content.innerHTML = '<div class="loading-container"><div class="simple-spinner"></div></div>';
    }
}
</script>

{{ end }}
